<html>
  <head>
    <title>container + WASI on browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.17.0/css/xterm.css">
  </head>
  <body>
    <div id="terminal"></div>
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.17.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-pty@0.9.4/index.js"></script>
    <script>
      // Force all dynamically-created iframes (e.g. @fkn/lib's RPC iframe to
      // https://fkn.app/api) to be credentialless, so cross-origin embedding
      // works under our parent's COEP without the embedded doc opting in.
      (function () {
        const _ce = Document.prototype.createElement;
        Document.prototype.createElement = function (tag, opts) {
          const el = _ce.call(this, tag, opts);
          if (typeof tag === 'string' && tag.toLowerCase() === 'iframe') {
            try { el.credentialless = true; } catch (e) {}
          }
          return el;
        };
      })();
    </script>
    <script src="./webvpn-bundle.js"></script>
    <script src="./webvpn-netstack.js"></script>
    <script src="./registry.js"></script>
    <script src="./stack.js"></script>
    <script src="./ws-delegate.js"></script>
    <script>
      const xterm = new Terminal();
      window.xterm = xterm;   // for driver introspection
      xterm.open(document.getElementById("terminal"));

      const { master, slave } = openpty();

      termios = slave.ioctl("TCGETS");
      termios.iflag &= ~(/*IGNBRK | BRKINT | PARMRK |*/ ISTRIP | INLCR | IGNCR | ICRNL | IXON);
      termios.oflag &= ~(OPOST);
      termios.lflag &= ~(ECHO | ECHONL | ICANON | ISIG | IEXTEN);
      //termios.cflag &= ~(CSIZE | PARENB);
      //termios.cflag |= CS8;
      slave.ioctl("TCSETS", new Termios(termios.iflag, termios.oflag, termios.cflag, termios.lflag, termios.cc));
      xterm.loadAddon(master);
      const worker = new Worker("./worker.js"+location.search);

      var nwStack;
      var netParam = getNetParam();
      // Override the container wasm URL via either:
      //   ?wasm-url=/playground.wasm   (any URL — used by the in-browser playground)
      //   ?wasm=<jobId>                (legacy backend-built; resolves to /wasm/<id>/out.wasm)
      // Default is /out.wasm.
      var queryParams = new URLSearchParams(location.search);
      var wasmUrl = queryParams.get('wasm-url');
      var wasmId  = queryParams.get('wasm');
      var workerImage = wasmUrl
          ? new URL(wasmUrl, location.href).toString()
          : location.origin + (wasmId ? "/wasm/" + wasmId + "/out.wasm" : "/out.wasm");
      if (netParam) {
          if (netParam.mode == 'delegate') {
              nwStack = delegate(worker, workerImage, netParam.param);
          } else if (netParam.mode == 'browser') {
              nwStack = newStack(worker, workerImage, new Worker("./stack-worker.js"+location.search), location.origin + "/c2w-net-proxy.wasm");
          } else if (netParam.mode == 'webvpn') {
              nwStack = newStack(worker, workerImage, new Worker("./webvpn-stack-worker.js"+location.search), location.origin + "/c2w-webvpn-proxy.wasm");
          }
      }
      if (!nwStack) {
          worker.postMessage({type: "init", imagename: workerImage});
      }
      new TtyServer(slave).start(worker, nwStack);

      // In-browser dockerfile playground: if location.hash carries a base64
      // Dockerfile, kick off the FROM-image pulls *in JS* right now (so the
      // netstack proxy's gateway HTTP server has bytes ready by the time the
      // guest wget's them), then when the shell prompt appears type a build
      // script that pulls each FROM ref from gateway:9090.
      (function () {
          const m = location.hash.match(/(?:^#|&)dockerfile=([^&]+)/);
          if (!m) return;
          // URL-decode (location.hash leaves %xx escapes as-is) then re-pad
          // base64 in case the caller stripped trailing '=' (busybox base64 -d
          // in the guest is strict about padding).
          let dockerfileB64 = decodeURIComponent(m[1]);
          while (dockerfileB64.length % 4) dockerfileB64 += '=';
          const dockerfileText = atob(dockerfileB64);
          const refs = (typeof WebvpnRegistry !== "undefined")
              ? WebvpnRegistry.dockerfileFromRefs(dockerfileText) : [];
          if (!globalThis.webvpnImages) globalThis.webvpnImages = new Map();
          for (const ref of refs) {
              if (globalThis.webvpnImages.has(ref)) continue;
              const entry = { promise: null, bytes: null };
              globalThis.webvpnImages.set(ref, entry);
              console.log("[registry] pulling " + ref);
              entry.promise = WebvpnRegistry.pullImage(ref, {
                  onLog: (s) => console.log("[registry] " + ref + ": " + s),
              }).then((b) => { entry.bytes = b; return b });
          }

          const storageConf =
              '[storage]\\n' +
              'driver = "vfs"\\n' +
              'graphroot = "/var/lib/containers/storage"\\n' +
              'runroot = "/run/containers/storage"\\n' +
              '[storage.options]\\n';
          // Build a "wget ... && buildah pull" block per FROM ref. The guest
          // reaches the netstack proxy's image HTTP server at gateway:9090; tar
          // bytes come from the per-image JS cache populated above.
          let pullBlock = '';
          for (const ref of refs) {
              const enc = encodeURIComponent(ref);
              const safe = ref.replace(/[^A-Za-z0-9._-]/g, '_');
              pullBlock +=
                  'echo "== pull ' + ref + ' =="\n' +
                  "wget -q 'http://192.168.127.1:9090/img/" + enc + "' -O /tmp/" + safe + ".tar || { echo wget-failed; exit 1; }\n" +
                  'buildah pull docker-archive:/tmp/' + safe + '.tar\n';
          }
          const script =
              'mkdir -p /work /var/lib/containers/storage /run/containers/storage /etc/containers && cd /work\n' +
              "printf '" + storageConf + "' > /etc/containers/storage.conf\n" +
              pullBlock +
              "echo '" + dockerfileB64 + "' | base64 -d > Dockerfile\n" +
              'echo == buildah build ==\n' +
              'buildah bud --isolation chroot --pull=never -t userimg .\n' +
              'echo == running container ==\n' +
              'ctr=$(buildah from userimg) && buildah run --tty "$ctr" /bin/sh\n';

          // Wait for the shell to be ready by watching for a "/ #" prompt in
          // xterm's screen buffer, then feed the script through the master
          // (xterm-pty exposes a `notify` event to send input back to the PTY,
          // but the simplest robust path is to dispatch keydown events through
          // the terminal's onKey handler — falls through to slave stdin).
          let sent = false;
          const tryFeed = () => {
              if (sent) return;
              const buf = xterm.buffer.active;
              const cursorRow = buf.baseY + buf.cursorY;
              let last = '';
              for (let y = Math.max(0, cursorRow - 2); y <= cursorRow; y++) {
                  const line = buf.getLine(y);
                  if (line) last += line.translateToString(true);
              }
              if (!/# *$/.test(last)) return;
              sent = true;
              // Feed each character through xterm-pty's master so the PTY sees
              // it as keyboard input. xterm.paste() goes through the same path.
              xterm.paste(script);
          };
          const iv = setInterval(() => { tryFeed(); if (sent) clearInterval(iv); }, 1000);
      })();

      function getNetParam() {
          var vars = location.search.substring(1).split('&');
          for (var i = 0; i < vars.length; i++) {
              var kv = vars[i].split('=');
              if (decodeURIComponent(kv[0]) == 'net') {
                  return {
                      mode: kv[1],
                      param: kv[2],
                  };
              }
          }
          return null;
      }
    </script>
  </body>
</html>
